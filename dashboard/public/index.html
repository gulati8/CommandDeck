<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommandDeck</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="header">
    <a href="#/" class="logo" onclick="switchTab('missions'); return false;">CommandDeck</a>
    <nav class="tabs">
      <button class="tab active" data-tab="missions" onclick="switchTab('missions')">Missions</button>
      <button class="tab" data-tab="projects" onclick="switchTab('projects')">Projects</button>
      <button class="tab" data-tab="system" onclick="switchTab('system')">System</button>
    </nav>
    <button class="btn btn-primary header-action" onclick="openStartMission()">+ New Mission</button>
  </header>

  <!-- Missions Tab (home) -->
  <main id="tab-missions" class="tab-content active">
    <div id="missions-home"></div>
  </main>

  <!-- Mission Detail (sub-view of missions tab) -->
  <main id="view-detail" class="tab-content" style="display:none">
    <nav class="breadcrumb">
      <a href="#/" onclick="switchTab('missions'); return false;">Missions</a>
      <span> / </span>
      <span id="bc-detail-label"></span>
    </nav>
    <div id="detail-header"></div>
    <div id="detail-body"></div>
  </main>

  <!-- Projects Tab -->
  <main id="tab-projects" class="tab-content">
    <div id="projects-grid" class="projects-grid"></div>
  </main>

  <!-- Project Missions (sub-view of projects tab) -->
  <main id="view-project-missions" class="tab-content" style="display:none">
    <nav class="breadcrumb">
      <a href="#/" onclick="switchTab('projects'); return false;">Projects</a>
      <span> / </span>
      <span id="bc-project-label"></span>
    </nav>
    <div id="project-missions-list"></div>
  </main>

  <!-- System Tab -->
  <main id="tab-system" class="tab-content">
    <div class="system-grid">
      <div class="system-card">
        <div class="system-card-header">
          <span class="status-dot" id="server-dot"></span>
          <h3>CommandDeck Server</h3>
        </div>
        <div class="system-meta" id="server-info"></div>
      </div>
    </div>
    <h3 class="section-title" id="containers-title">Containers</h3>
    <div id="containers-grid" class="containers-grid"></div>
  </main>

  <!-- Start Mission Modal -->
  <div id="modal-start-mission" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-start-mission')">
    <div class="modal">
      <div class="modal-header">
        <h2>Start New Mission</h2>
        <button class="modal-close" onclick="closeModal('modal-start-mission')">&times;</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">Project</label>
        <select id="sm-project" class="modal-input"></select>

        <label class="modal-label">Describe the task</label>
        <textarea id="sm-prompt" class="modal-input modal-textarea" rows="4" placeholder="Add email notifications for appointment reminders"></textarea>

        <label class="modal-check">
          <input type="checkbox" id="sm-slack" checked>
          Post to Slack thread
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('modal-start-mission')">Cancel</button>
        <button class="btn btn-primary" id="sm-submit" onclick="submitStartMission()">Start Mission</button>
      </div>
    </div>
  </div>

  <!-- Reconnect Thread Modal -->
  <div id="modal-reconnect" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-reconnect')">
    <div class="modal">
      <div class="modal-header">
        <h2>Reconnect to Slack Thread</h2>
        <button class="modal-close" onclick="closeModal('modal-reconnect')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-info">
          <div>Mission: <strong id="rc-mission-id"></strong></div>
          <div>Status: <span id="rc-status"></span></div>
        </div>

        <label class="modal-label">Paste Slack thread URL</label>
        <input type="text" id="rc-url" class="modal-input" placeholder="https://yourteam.slack.com/archives/C.../p...">

        <div class="modal-hint">
          This will link this mission to the Slack thread, post an approval prompt if a PR is open, and enable conversational follow-ups.
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('modal-reconnect')">Cancel</button>
        <button class="btn btn-primary" id="rc-submit" onclick="submitReconnect()">Reconnect</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
